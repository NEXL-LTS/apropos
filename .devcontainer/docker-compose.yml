services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.claude.json:/home/vscode/.claude.json
      - ${HOME}/.ssh:/home/vscode/.ssh:ro
      - claude-data:/home/vscode/.claude
      # `opencode auth login` writes the credential to ~/.local/share/opencode
      # (confirmed via `opencode debug paths`), NOT ~/.config/opencode — that
      # directory only holds config (opencode.json, AGENTS.md). Mounting only
      # .config here silently drops auth on every rebuild, so live OpenCode e2e
      # tests (e2e/tests/layer*.bats) always skip for "not authenticated".
      - opencode-data:/home/vscode/.local/share/opencode
      - opencode-config:/home/vscode/.config/opencode
      # Gemini CLI, Codex CLI, GitHub Copilot CLI, and Cursor CLI each keep
      # their OAuth/session credentials under a single dotdir in $HOME
      # (confirmed by probing each CLI directly — none split config from
      # auth the way OpenCode does), so one named volume per CLI is enough.
      # Each persists once you run its login flow inside the container:
      # `gemini` (browser OAuth on first prompt), `codex login`,
      # `copilot` + `/login`, `agent login`.
      - gemini-data:/home/vscode/.gemini
      - codex-data:/home/vscode/.codex
      - copilot-data:/home/vscode/.copilot
      - cursor-data:/home/vscode/.cursor
      - crystal-cache:/home/vscode/.cache/crystal
    # kcov (the coverage gate) drives the spec binary under ptrace and calls
    # personality() to disable ASLR. The default container sandbox blocks both,
    # so `make coverage` needs these two relaxations (see the Dockerfile note).
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    command: sleep infinity
    environment:
      - GH_TOKEN=${GH_TOKEN}

volumes:
  claude-data:
  opencode-data:
  opencode-config:
  gemini-data:
  codex-data:
  copilot-data:
  cursor-data:
  crystal-cache:
