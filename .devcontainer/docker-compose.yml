services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
    volumes:
      - ..:/workspace:cached
      - ${HOME}/.claude.json:/home/vscode/.claude.json
      - ${HOME}/.ssh:/home/vscode/.ssh:ro
      - claude-data:/home/vscode/.claude
      - crystal-cache:/home/vscode/.cache/crystal
    # kcov (the coverage gate) drives the spec binary under ptrace and calls
    # personality() to disable ASLR. The default container sandbox blocks both,
    # so `make coverage` needs these two relaxations (see the Dockerfile note).
    cap_add:
      - SYS_PTRACE
    security_opt:
      - seccomp:unconfined
    command: sleep infinity

volumes:
  claude-data:
  crystal-cache:
