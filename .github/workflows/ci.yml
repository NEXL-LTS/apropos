name: CI

on:
  push:
    branches: [main]
  pull_request:

# The spec/lint/coverage job runs on ubuntu-latest via
# the install-crystal action rather than the crystallang/crystal:alpine
# container, because kcov (the coverage gate) needs a full glibc userland and
# ptrace — neither of which the Alpine build image provides cleanly. Ubuntu
# 24.04 (noble) DROPPED the `kcov` apt package, so kcov is built from a pinned
# release here (mirroring .devcontainer/Dockerfile). GitHub's runner VM allows
# ptrace + personality() without the seccomp relaxation the local devcontainer
# needs. The static musl build still uses Alpine — in release.yml, via
# `docker run` (the Crystal Alpine image ships no Node, which breaks JS-based
# Actions run *inside* a container).

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: crystal-lang/install-crystal@v1
        with:
          crystal: 1.20.3

      - name: Install dependencies
        run: shards install

      - name: Format check
        run: crystal tool format --check

      - name: Lint (ameba, zero findings)
        run: ./bin/ameba

      - name: Specs
        run: crystal spec

      - name: Install coverage tooling (jq + kcov from source)
        env:
          KCOV_VERSION: v43
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            jq cmake binutils-dev libcurl4-openssl-dev libdw-dev libelf-dev libiberty-dev python3
          git clone --depth 1 --branch "$KCOV_VERSION" \
            https://github.com/SimonKagstrom/kcov.git /tmp/kcov
          cmake -S /tmp/kcov -B /tmp/kcov/build \
            -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX=/usr/local
          cmake --build /tmp/kcov/build --parallel "$(nproc)"
          sudo cmake --install /tmp/kcov/build
          rm -rf /tmp/kcov

      - name: Coverage (100% line gate)
        run: ./scripts/coverage.sh

      - name: Unreachable-code check (paired with coverage)
        run: crystal tool unreachable src/apropos.cr

      - name: Release smoke build
        run: crystal build --release src/apropos.cr -o bin/apropos

      # Self-check: the repo dogfoods the standard, so the built
      # binary must find its own generated skill wrappers byte-identical and its
      # own convention docs lint-clean. This is the drift gate against a
      # hand-edited SKILL.md or a malformed rule doc landing on main.
      - name: Self-check (generate --check && lint)
        run: |
          ./bin/apropos generate --check
          ./bin/apropos lint

  # Build the devcontainer image so a change to .devcontainer/Dockerfile (e.g.
  # the crystal/kcov/bats toolchain) can't break the dev environment unnoticed.
  # The image is loaded and smoke-checked to confirm the tools it installs are
  # actually on PATH and wired up (BATS_LIB_PATH in particular).
  devcontainer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build devcontainer image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: .devcontainer/Dockerfile
          load: true
          tags: apropos-devcontainer:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-check the installed toolchain
        run: |
          docker run --rm apropos-devcontainer:ci bash -c '
            set -e
            crystal --version
            shards --version
            kcov --version
            bats --version
            jq --version
            echo "BATS_LIB_PATH=$BATS_LIB_PATH"
            test -f "$BATS_LIB_PATH/bats-support/load.bash"
            test -f "$BATS_LIB_PATH/bats-assert/load.bash"
          '
